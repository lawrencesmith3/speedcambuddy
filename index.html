<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Not Today, Ticket | SF Speed Cameras</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background-color: #0f172a; }
        
        /* Map Container - oversized to prevent white corners when rotating */
        #map-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 180vmax;
            height: 180vmax;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #map { height: 100%; width: 100%; filter: grayscale(0.4) contrast(1.1); }
        
        /* Pulse Animation */
        .pulse-alert { animation: pulse-red 1.2s infinite ease-in-out; }
        @keyframes pulse-red {
            0% { background-color: rgba(220, 38, 38, 0.96); }
            50% { background-color: rgba(127, 29, 29, 0.98); }
            100% { background-color: rgba(220, 38, 38, 0.96); }
        }

        /* Prevent UI from rotating with the map */
        .fixed-ui { z-index: 9999; position: fixed; }
        
        #direction-arrow { transition: transform 0.3s ease-out; }
        
        .is-alerting #status-container { display: none; }
    </style>
</head>
<body class="overflow-hidden font-sans antialiased select-none">

    <!-- 1. START SCREEN -->
    <div id="start-screen" class="fixed inset-0 z-[20000] bg-slate-900 flex flex-col items-center justify-center p-8 text-center text-white">
        <h1 class="text-6xl font-black italic tracking-tighter mb-2 leading-none">NOT TODAY,<br>TICKET</h1>
        <p class="text-blue-400 font-bold uppercase tracking-widest text-[10px] mb-10">SF Proximity Utility</p>
        <button onclick="startApp()" class="w-full max-w-xs bg-blue-600 py-6 rounded-3xl text-2xl font-black shadow-2xl active:scale-95 transition-all">START DRIVING</button>
    </div>

    <!-- 2. ALERT UI -->
    <div id="alert-ui" class="fixed inset-0 z-[15000] hidden flex-col items-center justify-center text-white p-6 pulse-alert">
        <div id="arrow-container" class="mb-6">
            <svg id="direction-arrow" width="140" height="140" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
        </div>
        <h2 id="alert-headline" class="text-5xl font-black italic mb-6 uppercase tracking-tighter">🚨 SLOW DOWN 🚨</h2>
        <div class="bg-black/70 backdrop-blur-xl px-10 py-6 rounded-[3rem] border-4 border-white shadow-2xl flex flex-col items-center min-w-[220px]">
            <span id="dist-val" class="text-7xl font-mono font-black tracking-tighter">000</span>
            <span class="text-xl font-bold uppercase opacity-70 tracking-widest text-sm">Meters</span>
        </div>
        <div id="speed-limit-badge" class="mt-6 bg-white text-red-700 font-black px-8 py-2 rounded-2xl text-2xl">LIMIT: 25 MPH</div>
        <button onclick="hideAlert()" class="mt-10 text-white/30 text-[10px] font-bold uppercase tracking-[0.2em]">Close Alert</button>
    </div>

    <!-- 3. MAP WRAPPER (Rotates) -->
    <div id="map-wrapper">
        <div id="map"></div>
    </div>

    <!-- 4. TOP STATUS BAR (Fixed) -->
    <div id="status-container" class="fixed-ui top-6 left-4 right-4 pointer-events-none">
        <div class="bg-white/95 backdrop-blur-md shadow-2xl rounded-2xl p-4 flex justify-between items-center pointer-events-auto border border-slate-200">
            <div>
                <p id="status-text" class="text-sm font-black text-slate-800 italic uppercase leading-none">Finding GPS...</p>
                <p id="dist-text" class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-tighter">Scanning 33 Cameras</p>
            </div>
            
            <div class="flex gap-2">
                <!-- ORIENTATION TOGGLE -->
                <button onclick="toggleOrientation()" id="orient-btn" class="bg-blue-50 text-blue-600 text-[10px] font-black px-3 py-2 rounded-lg uppercase tracking-tighter border border-blue-100">
                    North Up
                </button>
                <button onclick="testAlert()" class="bg-slate-100 text-slate-500 text-[10px] font-black px-3 py-2 rounded-lg uppercase">Test</button>
            </div>
        </div>
    </div>

    <script>
        // DATASET
        const CAMERAS = [
            { id: 1, lat: 37.7725, lng: -122.5034, limit: 25 }, { id: 2, lat: 37.7766, lng: -122.4602, limit: 25 },
            { id: 3, lat: 37.7812, lng: -122.4661, limit: 25 }, { id: 4, lat: 37.7651, lng: -122.4856, limit: 30 },
            { id: 5, lat: 37.7354, lng: -122.5008, limit: 35 }, { id: 6, lat: 37.8016, lng: -122.4101, limit: 20 },
            { id: 7, lat: 37.7979, lng: -122.4087, limit: 25 }, { id: 8, lat: 37.8018, lng: -122.4018, limit: 25 },
            { id: 9, lat: 37.7850, lng: -122.4310, limit: 30 }, { id: 10, lat: 37.7818, lng: -122.4215, limit: 20 },
            { id: 11, lat: 37.7615, lng: -122.4430, limit: 30 }, { id: 12, lat: 37.7788, lng: -122.4116, limit: 20 },
            { id: 13, lat: 37.7753, lng: -122.4049, limit: 25 }, { id: 14, lat: 37.7711, lng: -122.4128, limit: 25 },
            { id: 15, lat: 37.7725, lng: -122.4095, limit: 25 }, { id: 16, lat: 37.7770, lng: -122.3948, limit: 25 },
            { id: 17, lat: 37.7821, lng: -122.3925, limit: 25 }, { id: 18, lat: 37.7785, lng: -122.3908, limit: 30 },
            { id: 19, lat: 37.7241, lng: -122.4518, limit: 25 }, { id: 20, lat: 37.7315, lng: -122.4442, limit: 25 },
            { id: 21, lat: 37.7165, lng: -122.4412, limit: 35 }, { id: 22, lat: 37.7121, lng: -122.4434, limit: 25 },
            { id: 23, lat: 37.7105, lng: -122.4528, limit: 30 }, { id: 24, lat: 37.7598, lng: -122.4235, limit: 25 },
            { id: 25, lat: 37.7651, lng: -122.4105, limit: 25 }, { id: 26, lat: 37.7485, lng: -122.4135, limit: 25 },
            { id: 27, lat: 37.7425, lng: -122.4230, limit: 30 }, { id: 28, lat: 37.7495, lng: -122.3912, limit: 25 },
            { id: 29, lat: 37.7215, lng: -122.3965, limit: 30 }, { id: 30, lat: 37.7188, lng: -122.4005, limit: 35 },
            { id: 31, lat: 37.8045, lng: -122.4245, limit: 25 }, { id: 32, lat: 37.7985, lng: -122.4238, limit: 25 },
            { id: 33, lat: 37.7460, lng: -122.4555, limit: 25 }
        ];

        // APP STATE
        let map, userMarker, wakeLock = null;
        let isAlerting = false;
        let isHeadingUp = false;
        let currentHeading = 0;
        let currentPos = { lat: 0, lng: 0 };
        
        const ALERT_DIST = 300; 

        function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            initMap();
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(handlePosition, null, { enableHighAccuracy: true });
                document.getElementById('status-text').innerText = "System Active";
            }
        }

        function toggleOrientation() {
            isHeadingUp = !isHeadingUp;
            const btn = document.getElementById('orient-btn');
            btn.innerText = isHeadingUp ? "Heading Up" : "North Up";
            btn.classList.toggle('bg-blue-600', isHeadingUp);
            btn.classList.toggle('text-white', isHeadingUp);
            
            if (!isHeadingUp) {
                document.getElementById('map-wrapper').style.transform = `translate(-50%, -50%) rotate(0deg)`;
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.7749, -122.4194], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

            CAMERAS.forEach(cam => {
                L.circle([cam.lat, cam.lng], { color: '#ef4444', weight: 1, fillOpacity: 0.2, radius: 80 }).addTo(map);
            });

            userMarker = L.circleMarker([0,0], { radius: 10, color: '#3b82f6', fillOpacity: 1, weight: 3, fillColor: 'white' }).addTo(map);
        }

        function handlePosition(pos) {
            const { latitude, longitude, heading } = pos.coords;
            currentPos = { lat: latitude, lng: longitude };
            
            // Note: browser 'heading' is often null if stationary. 
            // Only update if we have a valid speed/movement
            if (heading !== null) currentHeading = heading;

            userMarker.setLatLng([latitude, longitude]);
            map.panTo([latitude, longitude], { animate: true });

            // APPLY MAP ROTATION
            if (isHeadingUp) {
                document.getElementById('map-wrapper').style.transform = `translate(-50%, -50%) rotate(${-currentHeading}deg)`;
            }

            // FIND NEAREST
            let closest = { dist: 99999, cam: null };
            CAMERAS.forEach(cam => {
                const d = calcDist(latitude, longitude, cam.lat, cam.lng);
                if (d < closest.dist) { closest.dist = d; closest.cam = cam; }
            });

            document.getElementById('dist-text').innerText = `${Math.round(closest.dist)}m to nearest cam`;

            if (closest.dist <= ALERT_DIST && !isAlerting) {
                showAlert(closest.dist, closest.cam);
            } else if (closest.dist > ALERT_DIST + 50 && isAlerting) {
                hideAlert();
            } else if (isAlerting) {
                updateAlertUI(closest.dist, closest.cam);
            }
        }

        function updateAlertUI(dist, cam) {
            document.getElementById('dist-val').innerText = Math.round(dist);
            
            const bearing = getBearing(currentPos.lat, currentPos.lng, cam.lat, cam.lng);
            
            // Logic Change:
            // If North Up: Arrow points relative to North (bearing)
            // If Heading Up: Arrow points relative to top of phone (bearing - heading)
            let arrowRotation = isHeadingUp ? (bearing - currentHeading) : bearing;
            
            document.getElementById('direction-arrow').style.transform = `rotate(${arrowRotation}deg)`;
        }

        function showAlert(dist, cam) {
            isAlerting = true;
            document.body.classList.add('is-alerting');
            document.getElementById('speed-limit-badge').innerText = `LIMIT: ${cam.limit} MPH`;
            document.getElementById('alert-ui').style.display = 'flex';
            updateAlertUI(dist, cam);
        }

        function hideAlert() {
            isAlerting = false;
            document.body.classList.remove('is-alerting');
            document.getElementById('alert-ui').style.display = 'none';
        }

        // UTILS
        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
            const x = Math.cos(lat1*Math.PI/180) * Math.sin(lat2*Math.PI/180) - Math.sin(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.cos((lon2-lon1)*Math.PI/180);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function testAlert() { showAlert(120, CAMERAS[0]); }
    </script>
</body>
</html>
