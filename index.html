<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Not Today, Ticket | SF Speed Cameras</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { height: 100vh; width: 100%; z-index: 1; filter: grayscale(0.4) contrast(1.1); }
        
        .pulse-alert {
            animation: pulse-red 1.2s infinite ease-in-out;
        }

        @keyframes pulse-red {
            0% { background-color: rgba(220, 38, 38, 0.96); }
            50% { background-color: rgba(127, 29, 29, 0.98); }
            100% { background-color: rgba(220, 38, 38, 0.96); }
        }

        .is-alerting #status-container, .is-alerting #ad-banner {
            display: none;
        }

        /* Smooth rotation for the compass arrow */
        #direction-arrow {
            transition: transform 0.5s ease-out;
        }
    </style>
</head>
<body class="bg-slate-900 overflow-hidden font-sans antialiased select-none">

    <!-- 1. START SCREEN -->
    <div id="start-screen" class="fixed inset-0 z-[10000] bg-slate-900 flex flex-col items-center justify-center p-8 text-center text-white">
        <div class="mb-8 text-center">
            <h1 class="text-6xl font-black italic tracking-tighter leading-none mb-2">NOT TODAY,<br>TICKET</h1>
            <p class="text-blue-400 font-bold uppercase tracking-widest text-xs border-y border-blue-400/30 py-2">SF 300m Precision Build</p>
        </div>
        
        <button onclick="startApp()" class="w-full max-w-xs bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-3xl text-2xl shadow-[0_0_50px_rgba(37,99,235,0.3)] active:scale-95 transition-all">
            GO DRIVE
        </button>
        
        <p class="mt-10 text-[10px] text-slate-500 uppercase tracking-widest leading-relaxed">
            Shortened 300m Alert Radius<br>Dynamic Directional Tracking
        </p>
    </div>

    <!-- 2. ALERT UI -->
    <div id="alert-ui" class="fixed inset-0 z-[9999] hidden flex-col items-center justify-center text-white p-6 pulse-alert">
        
        <!-- DYNAMIC ARROW -->
        <div id="arrow-container" class="mb-8">
            <svg id="direction-arrow" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
        </div>

        <h2 id="alert-headline" class="text-5xl font-black italic text-center drop-shadow-2xl mb-6 leading-tight uppercase tracking-tighter">🚨 SLOW DOWN 🚨</h2>
        
        <div class="flex flex-col items-center gap-6">
            <div class="bg-black/70 backdrop-blur-xl px-10 py-6 rounded-[3rem] border-4 border-white shadow-2xl flex flex-col items-center min-w-[200px]">
                <span id="dist-val" class="text-7xl font-mono font-black tracking-tighter">0.00</span>
                <span class="text-xl font-bold uppercase opacity-70">Meters</span>
            </div>
            
            <div id="speed-limit-badge" class="bg-white text-red-700 font-black px-8 py-2 rounded-2xl text-2xl shadow-2xl">
                LIMIT: 25 MPH
            </div>
        </div>

        <button onclick="hideAlert()" class="mt-12 text-white/30 border border-white/10 px-8 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest">
            Close Alert
        </button>
    </div>

    <!-- 3. MAP -->
    <div id="map"></div>

    <!-- 4. TOP STATUS BAR -->
    <div id="status-container" class="fixed top-6 left-4 right-4 z-[500] pointer-events-none">
        <div class="bg-white/95 backdrop-blur-md shadow-2xl rounded-2xl p-4 flex justify-between items-center pointer-events-auto border border-slate-200">
            <div>
                <p class="text-[10px] uppercase font-black text-slate-400 leading-none mb-1 tracking-widest">Tracking Distance</p>
                <p id="status-text" class="text-sm font-bold text-slate-800 italic">Finding GPS...</p>
            </div>
            <button onclick="testAlert()" class="bg-slate-100 text-slate-500 text-[10px] font-black px-4 py-2 rounded-lg uppercase">Test</button>
        </div>
    </div>

    <script>
        const CAMERAS = [
            { id: 1, lat: 37.7725, lng: -122.5034, name: "Fulton St (42nd-43rd)", limit: 25 },
            { id: 2, lat: 37.7766, lng: -122.4602, name: "Fulton St (Arguello-2nd)", limit: 25 },
            { id: 3, lat: 37.7812, lng: -122.4661, name: "Geary Blvd (7th-8th)", limit: 25 },
            { id: 4, lat: 37.7651, lng: -122.4856, name: "Lincoln Way (27th-28th)", limit: 30 },
            { id: 5, lat: 37.7354, lng: -122.5008, name: "Sloat Blvd (41st-Skyline)", limit: 35 },
            { id: 6, lat: 37.8016, lng: -122.4101, name: "Columbus Ave (Lombard)", limit: 20 },
            { id: 7, lat: 37.7979, lng: -122.4087, name: "Broadway (Powell)", limit: 25 },
            { id: 8, lat: 37.8018, lng: -122.4018, name: "Embarcadero (Green)", limit: 25 },
            { id: 9, lat: 37.7850, lng: -122.4310, name: "Geary Blvd (Webster)", limit: 30 },
            { id: 10, lat: 37.7818, lng: -122.4215, name: "Turk St (Van Ness)", limit: 20 },
            { id: 11, lat: 37.7615, lng: -122.4430, name: "Market St (Danvers)", limit: 30 },
            { id: 12, lat: 37.7788, lng: -122.4116, name: "Mission St (8th-9th)", limit: 20 },
            { id: 13, lat: 37.7753, lng: -122.4049, name: "7th St (Harrison)", limit: 25 },
            { id: 14, lat: 37.7711, lng: -122.4128, name: "9th St (Bryant)", limit: 25 },
            { id: 15, lat: 37.7725, lng: -122.4095, name: "10th St (Harrison)", limit: 25 },
            { id: 16, lat: 37.7770, lng: -122.3948, name: "Harrison St (4th-5th)", limit: 25 },
            { id: 17, lat: 37.7821, lng: -122.3925, name: "Bryant St (2nd-3rd)", limit: 25 },
            { id: 18, lat: 37.7785, lng: -122.3908, name: "King St (4th-5th)", limit: 30 },
            { id: 19, lat: 37.7241, lng: -122.4518, name: "Ocean Ave (Frida Kahlo)", limit: 25 },
            { id: 20, lat: 37.7315, lng: -122.4442, name: "Monterey Blvd (Edna)", limit: 25 },
            { id: 21, lat: 37.7165, lng: -122.4412, name: "Geneva Ave (Prague)", limit: 35 },
            { id: 22, lat: 37.7121, lng: -122.4434, name: "Mission St (Ottawa)", limit: 25 },
            { id: 23, lat: 37.7105, lng: -122.4528, name: "San Jose Ave (Santa Ynez)", limit: 30 },
            { id: 24, lat: 37.7598, lng: -122.4235, name: "Guerrero St (19th-20th)", limit: 25 },
            { id: 25, lat: 37.7651, lng: -122.4105, name: "16th St (Bryant-Potrero)", limit: 25 },
            { id: 26, lat: 37.7485, lng: -122.4135, name: "Cesar Chavez (Folsom)", limit: 25 },
            { id: 27, lat: 37.7425, lng: -122.4230, name: "San Jose Ave (29th-30th)", limit: 30 },
            { id: 28, lat: 37.7495, lng: -122.3912, name: "Cesar Chavez (Indiana)", limit: 25 },
            { id: 29, lat: 37.7215, lng: -122.3965, name: "3rd St (Key-Jamestown)", limit: 30 },
            { id: 30, lat: 37.7188, lng: -122.4005, name: "Bayshore Blvd", limit: 35 },
            { id: 31, lat: 37.8045, lng: -122.4245, name: "Bay St (Octavia)", limit: 25 },
            { id: 32, lat: 37.7985, lng: -122.4238, name: "Franklin St (Union)", limit: 25 },
            { id: 33, lat: 37.7460, lng: -122.4555, name: "Laguna Honda Blvd", limit: 25 }
        ];

        const MEMES = ["🚨 BRO. SLOW DOWN. 🚨", "💸 NOT TODAY, TICKET 💸", "🚓 THEY SEE YOU. 🚓", "🐌 SLOW DOWN MR. FAST 🐌", "🛑 CALM YOUR JETS 🛑"];
        
        let map, userMarker, wakeLock = null;
        let isAlerting = false;
        
        // NEW PARAMETERS
        const ALERT_DIST_METERS = 300; 
        const CLEAR_DIST_METERS = 350; // Hysteresis

        async function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            initMap();
            requestWakeLock();
            
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(handlePosition, handleGPSError, {
                    enableHighAccuracy: true,
                    maximumAge: 0
                });
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.7749, -122.4194], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

            CAMERAS.forEach(cam => {
                L.circle([cam.lat, cam.lng], { color: '#ef4444', weight: 1, fillOpacity: 0.15, radius: 100 }).addTo(map);
            });

            userMarker = L.circleMarker([0,0], { radius: 10, color: '#3b82f6', fillOpacity: 1, weight: 3, fillColor: 'white' }).addTo(map);
        }

        function handlePosition(pos) {
            const { latitude, longitude, heading } = pos.coords;
            const userPos = [latitude, longitude];

            userMarker.setLatLng(userPos);
            map.panTo(userPos);

            let closest = { dist: 999999, cam: null };
            CAMERAS.forEach(cam => {
                const d = calcDistMeters(latitude, longitude, cam.lat, cam.lng);
                if (d < closest.dist) {
                    closest.dist = d;
                    closest.cam = cam;
                }
            });

            document.getElementById('status-text').innerText = `${Math.round(closest.dist)}m to nearest`;

            // TRIGGER LOGIC
            if (closest.dist <= ALERT_DIST_METERS && !isAlerting) {
                showAlert(closest.dist, closest.cam);
            } else if (closest.dist >= CLEAR_DIST_METERS && isAlerting) {
                hideAlert();
            } else if (isAlerting) {
                updateAlertUI(closest.dist, latitude, longitude, closest.cam);
            }
        }

        function updateAlertUI(dist, userLat, userLon, cam) {
            document.getElementById('dist-val').innerText = Math.round(dist);
            
            // Calculate Bearing to Camera
            const bearing = getBearing(userLat, userLon, cam.lat, cam.lng);
            
            // Rotate the arrow
            // Note: This points relative to North (Top of phone = North)
            const arrow = document.getElementById('direction-arrow');
            arrow.style.transform = `rotate(${bearing}deg)`;
        }

        function showAlert(dist, cam) {
            isAlerting = true;
            document.body.classList.add('is-alerting');
            const ui = document.getElementById('alert-ui');
            document.getElementById('alert-headline').innerText = MEMES[Math.floor(Math.random() * MEMES.length)];
            document.getElementById('speed-limit-badge').innerText = `LIMIT: ${cam.limit} MPH`;
            ui.style.display = 'flex';
        }

        function hideAlert() {
            isAlerting = false;
            document.body.classList.remove('is-alerting');
            document.getElementById('alert-ui').style.display = 'none';
        }

        // --- MATH UTILS ---

        // Distance in Meters (Haversine)
        function calcDistMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth radius in meters
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Bearing Calculation (Degrees)
        function getBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const λ1 = lon1 * Math.PI/180;
            const λ2 = lon2 * Math.PI/180;

            const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) -
                      Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);
            const θ = Math.atan2(y, x);
            return (θ * 180 / Math.PI + 360) % 360; // 0-360 degrees
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        function handleGPSError(err) {
            document.getElementById('status-text').innerText = "GPS Error";
        }

        function testAlert() {
            showAlert(150, CAMERAS[0]);
            updateAlertUI(150, 37.77, -122.41, CAMERAS[0]);
        }
    </script>
</body>
</html>
